      - memory/source-map.md
      - memory/collaboration.md
      - memory/pinned.md
      - memory/workstreams.md
      - memory/workstreams/_template.md
      - memory/recent-activity.md
      - memory/projects/_template.md
      - memory/todos.md
      - memory/knowledge_map.md
